<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalição 02</title>

    <script src="js/script.js" defer></script>
</head>
<body>

    <div id="div-geral">
        <h1>Formulário</h1>

        <div id="div-form">

            <form id="form-eletronico">

                <label for="descricao">Descrição</label>
                <input type="text" id="descricao" name="descricao"><br><br>

                <label for="valor-unitario">Valor unitário</label>
                <input type="number" id="valor-unitario" name="valor-unitario"><br><br>

                <label for="quantidade">Quantidade</label>
                <input type="number" id="quantidade" name="quantidade"><br><br>

                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>

            </form>
        </div>
    </div>

</body>
</html>
